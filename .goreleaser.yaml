version: 2

project_name: conpas-ai

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/conpas-ai
    binary: conpas-ai
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: Thrasno
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: conpas-ai
    homepage: "https://github.com/Thrasno/conpas-ai"
    description: "AI Conpas Stack — One command to configure any AI coding agent on any OS."
    license: "MIT"
    commit_msg_template: "chore: update conpas-ai formula to {{ .Tag }}"
